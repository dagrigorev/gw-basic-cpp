name: Create Release

on:
  push:
    tags:
      - 'v*'   # запуск при пуше тега вида v1.0.0, v2.1.3 и т.д.

permissions:
  contents: write

jobs:
  release:
    name: Create Release and Upload Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build executable (пример)
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Package artifacts
        run: |
          mkdir artifacts
          cp build/gwbasic artifacts/
          zip -r docs.zip build/docs/api/html

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Автоматически созданный релиз для ${{ github.ref_name }}
            Изменения смотрите в [CHANGELOG.md](CHANGELOG.md)
          draft: false
          prerelease: false
          files: |
            artifacts/gwbasic
            artifacts/docs.zip
